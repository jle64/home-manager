monitor=eDP-1,preferred,0x0,1
monitor=HDMI-A-1,preferred,1920x0,1

#exec-once = waybar
#exec-once = nwg-panel
#exec-once = hyprpaper
#exec-once = swaybg -i /home/jonathan/.local/share/backgrounds/wall.png
#exec-once = gammastep
#exec-once = dunst
#exec-once = copyq --start-server
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
#exec-once = nm-applet

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

input {
    follow_mouse = 1
    kb_layout = fr(us)

    touchpad {
        natural_scroll = yes
    }
}

device {
    name = keychron-keychron-k2
    kb_layout = fr(us)
}
device { 
    name = at-translated-set-2-keyboard
    kb_layout = fr
}

decoration {
    rounding = 8
    #blur = yes
    #blur_size = 3
    #blur_passes = 1
    #blur_new_optimizations = on

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = no
}

dwindle {
    force_split = 2
    pseudotile = yes
    preserve_split = yes
}

#master {
#    new_is_master = false
#}

gestures {
    workspace_swipe = on
}

bind = SUPER, RETURN, exec, kitty
bind = SUPER, SPACE, exec, shell-ipc spotlight toggle
bind = SUPER, V, exec, shell-ipc clipboard toggle
bind = SUPER, comma, exec, shell-ipc settings focusOrToggle
bind = SUPER, Y, exec, shell-ipc dankdash wallpaper
bind = SUPER, M, exec, shell-ipc processlist focusOrToggle
bind = SUPER SHIFT, N, exec, shell-ipc notifications toggle

# Apps
bind = SUPER, N, exec, nautilus
bind = SUPER, W, exec, flatpak run io.gitlab.librewolf-community
bind = SUPER, T, exec, flatpak run org.mozilla.Thunderbird
bind = SUPER, E, exec, flatpak run org.gnome.TextEditor

bind = , PRINT, exec, ~/.local/bin/screen_full_hyp.sh
bind = ALT, PRINT, exec, ~/.local/bin/screen_win_hyp.sh
bind = SUPER, PRINT, exec, ~/.local/bin/screen_zone_hyp.sh

bind = SUPER, TAB, exec, hyprctl dispatch workspace e+1
bind = SUPER SHIFT, E, exit, 
bind = SUPER, F, togglefloating, 
bind = SUPER, G, togglegroup,
bind = SUPER, S, swapactiveworkspaces, HDMI-A-1 eDP-1
bind = SUPER, L, togglesplit,
bind = SUPER ALT, L, exec, shell-ipc lock lock
bind = SUPER, Q, killactive, 
# switch to dwindle or master layout
bind = SUPER, D, exec, hyprctl keyword general:layout "dwindle"
bind = SUPER SHIFT, M, exec, hyprctl keyword general:layout "master"
# promote window to master
bind = SUPER, P, layoutmsg,swapwithmaster master

# Move focus with winMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
# Add shift to move window
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# resize submap (modal)
bind = SUPER, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = , escape, submap, reset 
submap = reset

# Switch workspaces with wsMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with wsMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with wsMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with winMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

windowrulev2 = float,class:(com.github.hluk.copyq)
windowrulev2 = size 20% 90%,class:(com.github.hluk.copyq)
windowrulev2 = move 80% 5%,class:(com.github.hluk.copyq)

# Multimedia
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


source = /var/home/jonathan/.config/hypr/noctalia/noctalia-colors.conf

