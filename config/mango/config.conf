# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=none
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=fr

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:scroller,tile
tagrule=id:2,layout_name:scroller,tile
tagrule=id:3,layout_name:scroller,tile
tagrule=id:4,layout_name:scroller,tile
tagrule=id:5,layout_name:scroller,tile
tagrule=id:6,layout_name:scroller,tile
tagrule=id:7,layout_name:scroller,tile
tagrule=id:8,layout_name:scroller,tile
tagrule=id:9,layout_name:scroller,tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: Super,Ctrl,alt,shift,none

# reload config
bind=Super,r,reload_config

# menu and terminal
bind=Super,return,spawn,kitty
bind=Super,space,spawn,qs -c noctalia-shell ipc call launcher toggle

# exit
bind=Super+Shift,e,quit
bind=Super,q,killclient

# apps
bind=Super,n,spawn,nautilus
bind=Super,w,spawn,flatpak run io.gitlab.librewolf-community
bind=Super,t,spawn,flatpak run org.mozilla.Thunderbird
bind=Super,e,spawn,flatpak run org.gnome.TextEditor

# noctalia shell ipc calls
bind=Super,v,spawn,qs -c noctalia-shell ipc call launcher clipboard
bind=Super,m,spawn,qs -c noctalia-shell ipc call systemMonitor toggle
bind=Super,comma,spawn,qs -c noctalia-shell ipc call settings toggle
bind=Super+Shift,n,spawn,qs -c noctalia-shell ipc call notifications toggleHistory
bind=Super,y,spawn,qs -c noctalia-shell ipc call wallpaper toggle
bind=Super+Alt,l,spawn,qs -c noctalia-shell ipc call lockScreen lock

# switch window focus
bind=Super,Tab,focusstack,next
bind=Super,Left,focusdir,left
bind=Super,Right,focusdir,right
bind=Super,Up,focusdir,up
bind=Super,Down,focusdir,down
bind=Super,h,focusdir,left
bind=Super,j,focusdir,down
bind=Super,k,focusdir,up
bind=Super,l,focusdir,right

# move window
bind=Super+Ctrl,Left,movewin,-50,+0
bind=Super+Ctrl,Right,movewin,+50,+0
bind=Super+Ctrl,Up,movewin,+0,-50
bind=Super+Ctrl,Down,movewin,+0,+50
bind=Super+Ctrl,h,movewin,-50,+0
bind=Super+Ctrl,l,movewin,+50,+0
bind=Super+Ctrl,k,movewin,+0,-50
bind=Super+Ctrl,j,movewin,+0,+50

# swap window
bind=Super+Shift,Up,exchange_client,up
bind=Super+Shift,Down,exchange_client,down
bind=Super+Shift,Left,exchange_client,left
bind=Super+Shift,Right,exchange_client,right

# switch window status
bind=Super,g,toggleglobal,
bind=Super,o,toggleoverview,
bind=Alt,backslash,togglefloating,
bind=Alt,a,togglemaximizescreen,
bind=Super+Shift,f,togglefullscreen,
bind=Alt+Shift,f,togglefakefullscreen,
bind=Super,i,minimized,
bind=Super+Shift,i,restore_minimized
bind=Alt,z,toggle_scratchpad

# scroller layout
bind=Alt,e,set_proportion,1.0
bind=Alt,x,switch_proportion_preset,

# switch layout
bind=Super+Shift,l,switch_layout

# tag switch
bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

bind=Super+Ctrl,1,tag,1,0
bind=Super+Ctrl,2,tag,2,0
bind=Super+Ctrl,3,tag,3,0
bind=Super+Ctrl,4,tag,4,0
bind=Super+Ctrl,5,tag,5,0
bind=Super+Ctrl,6,tag,6,0
bind=Super+Ctrl,7,tag,7,0
bind=Super+Ctrl,8,tag,8,0
bind=Super+Ctrl,9,tag,9,0

# monitor switch
bind=Super+Shift,Left,focusmon,left
bind=Super+Shift,Right,focusmon,right
bind=Super+Shift,Up,focusmon,up
bind=Super+Shift,Down,focusmon,down

bind=Super+Shift+Ctrl,Left,tagmon,left
bind=Super+Shift+Ctrl,Right,tagmon,right
bind=Super+Shift+Ctrl,Up,tagmon,up
bind=Super+Shift+Ctrl,Down,tagmon,down

# gaps
bind=Alt+Shift,X,incgaps,1
bind=Alt+Shift,Z,incgaps,-1
bind=Alt+Shift,R,togglegaps

# resizewin
bind=Ctrl+Alt,Up,resizewin,+0,-50
bind=Ctrl+Alt,Down,resizewin,+0,+50
bind=Ctrl+Alt,Left,resizewin,-50,+0
bind=Ctrl+Alt,Right,resizewin,+50,+0

# media controls and brightness
bindl=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%+
bindl=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindl=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause
bindl=NONE,XF86AudioNext,spawn,playerctl next
bindl=NONE,XF86AudioPrev,spawn,playerctl previous
bindl=NONE,XF86AudioStop,spawn,playerctl stop
bindl=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bindl=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=Super,btn_left,moveresize,curmove
mousebind=Super,btn_middle,togglemaximizescreen,0
mousebind=Super,btn_right,moveresize,curresize


# Axis Bindings
axisbind=Super,Up,viewtoleft_have_client
axisbind=Super,Down,viewtoright_have_client


# Autostart
exec-once=qs -c noctalia-shell &

# Gesture Bindings (3 doigts)
# Horizontal : navigation entre les fenêtres
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
# Vertical : navigation entre les tags
gesturebind=none,up,3,viewtoleft_have_client
gesturebind=none,down,3,viewtoright_have_client

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
