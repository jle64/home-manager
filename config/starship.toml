palette = "noctalia"
format = """
╭─ $directory$git_branch$git_status $fill $direnv$nix_shell $fill $username$hostname$shell
╰$character
"""

[fill]
symbol = " "

[character]
success_symbol = "─"
error_symbol = "[✗](red)"

[username]
style_user = "fg:crust bg:green"
style_root = "fg:red bg:green bold"
disabled = false
show_always = true
format = "[](fg:green)[ $user](fg:crust bg:green)($style)[](fg:green)"

[hostname]
format = "[](fg:red)[ $hostname](fg:crust bg:red)[](fg:red)"
ssh_only = false

[directory]
fish_style_pwd_dir_length = 1
read_only = "󰌾 "
format = "[](fg:magenta)[$path](fg:crust bg:magenta)[](fg:magenta)"

[git_branch]
format = "[](fg:yellow)[$symbol$branch(:$remote_branch)](fg:crust bg:yellow)"
symbol = " "

[git_status]
format = "[$all_status](fg:crust bg:yellow)[](fg:yellow)"

[line_break]
disabled = true

[shell]
disabled = false
format = "[](fg:cyan)[󱆃 $indicator](fg:crust bg:cyan)[](fg:cyan)"

[direnv]
disabled = false
format = " direnv $loaded"

[python]
disabled = false
format = " py $version $virtualenv"

[nix_shell]
disabled = false
format = " nix $name$state"






